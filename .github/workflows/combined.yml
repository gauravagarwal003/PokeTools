name: Update All
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Create .env file
        run: echo "GEOCACHING_API_KEY=${{ secrets.GEOCACHING_API_KEY }}" > .env

      - name: Update Prices
        run: python3 update_prices.py
      - name: Update Vending
        run: python3 update_vending.py

      - name: Commit & push price/vending changes as GitHub Actions bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/set_prices assets/sv_pack_prices.csv assets/sv_packs_expected_value.csv assets/vending_data assets/all_states.csv assets/all_states.geojson
          git commit -m "Updated Pokemon data" || echo "No price/vending changes to commit"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin HEAD:$(git rev-parse --abbrev-ref HEAD) || echo "Push failed or nothing to push"

      - name: Update Grading
        continue-on-error: true
        timeout-minutes: 45
        run: python3 update_grading.py

      - name: Commit & push grading changes as GitHub Actions bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin $(git rev-parse --abbrev-ref HEAD)
          git add assets/sets_price_data.json

          git commit -m "Updated Pokemon grading prices" || echo "No grading changes to commit"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin HEAD:$(git rev-parse --abbrev-ref HEAD) || echo "Push failed or nothing to push"
